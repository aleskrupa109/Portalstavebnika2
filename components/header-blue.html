<!--
    KOMPONENTA: Modrá hlavička Portálu stavebníka
    =============================================
    
    Použití:
    1. Vložte CSS styly z tohoto souboru do <style> tagu vaší stránky
    2. Vložte HTML část hlavičky do <body>
    3. Vložte JavaScript na konec stránky
    4. Nastavte aktivní položku menu pomocí třídy "active"
    
    Dynamické prvky (aktualizují se z localStorage):
    - #userDisplayName - jméno uživatele v tlačítku
    - #userDisplayDetail - detail (typ + IČO/datum narození)
    - #dropdownName - jméno v dropdown menu
    - #dropdownDetail - detail v dropdown menu
    - #dropdownBadge - badge typu osoby
-->

<!-- ============================================
     CSS STYLY - vložit do <style> tagu
     ============================================ -->
<style>
    :root {
        --gov-primary: #2c5a8c;
        --gov-primary-light: #3a7ab8;
        --gov-text-light: #ffffff;
        --gov-yellow: #f5a623;
    }

    /* ===== HLAVIČKA ===== */
    .gov-header {
        background: var(--gov-primary);
        position: sticky;
        top: 0;
        z-index: 1000;
    }

    .gov-header-top {
        padding: 14px 40px;
    }

    .gov-header-top-content {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .gov-header-brand {
        display: flex;
        align-items: center;
        gap: 14px;
        text-decoration: none;
        color: var(--gov-text-light);
    }

    .gov-header-logo {
        height: 38px;
        width: auto;
    }

    .gov-header-title {
        font-size: 18px;
        font-weight: 400;
        letter-spacing: 0.3px;
        color: var(--gov-text-light);
    }

    .gov-header-user {
        position: relative;
    }

    .gov-header-user-btn {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 16px;
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 4px;
        color: var(--gov-text-light);
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .gov-header-user-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.8);
    }

    .gov-header-user-btn svg.user-icon {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
    }

    .gov-header-user-btn .chevron {
        width: 12px;
        height: 12px;
        transition: transform 0.2s ease;
        flex-shrink: 0;
    }

    .gov-header-user-btn.active .chevron {
        transform: rotate(180deg);
    }

    .gov-header-user-info {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        line-height: 1.25;
        text-align: left;
    }

    .gov-header-user-name {
        font-weight: 500;
        font-size: 13px;
    }

    .gov-header-user-detail {
        font-size: 11px;
        opacity: 0.85;
    }

    .gov-header-user-dropdown {
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        min-width: 280px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        opacity: 0;
        visibility: hidden;
        transform: translateY(-10px);
        transition: all 0.2s ease;
        z-index: 100;
    }

    .gov-header-user-dropdown.show {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
    }

    .gov-header-user-dropdown-header {
        padding: 16px;
        border-bottom: 1px solid #eee;
        background: #f9fafb;
        border-radius: 8px 8px 0 0;
    }

    .gov-header-user-dropdown-name {
        font-weight: 600;
        color: #1a1a1a;
        font-size: 14px;
    }

    .gov-header-user-dropdown-detail {
        font-size: 12px;
        color: #666;
        margin-top: 2px;
    }

    .gov-header-user-dropdown-badge {
        display: inline-block;
        background: #e8f4fc;
        color: #2362a2;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 500;
        margin-top: 6px;
    }

    .gov-header-user-dropdown a {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 16px;
        color: #333;
        text-decoration: none;
        font-size: 14px;
        transition: background 0.15s ease;
    }

    .gov-header-user-dropdown a:last-child {
        border-radius: 0 0 8px 8px;
        border-top: 1px solid #eee;
        color: #c53030;
    }

    .gov-header-user-dropdown a:hover {
        background: #f5f7fa;
    }

    .gov-header-user-dropdown svg {
        width: 18px;
        height: 18px;
        color: #666;
    }

    .gov-header-user-dropdown a:last-child svg {
        color: #c53030;
    }

    /* ===== NAVIGACE ===== */
    .gov-header-nav {
        padding: 0 40px;
    }

    .gov-header-nav-content {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .gov-nav-menu {
        display: flex;
        align-items: center;
        gap: 0;
        list-style: none;
    }

    .gov-nav-link {
        display: block;
        padding: 14px 20px;
        color: var(--gov-text-light);
        text-decoration: none;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        transition: all 0.2s ease;
        border-top: 3px solid transparent;
    }

    .gov-nav-link:hover {
        background: rgba(255, 255, 255, 0.1);
    }

    .gov-nav-link.active {
        border-top-color: var(--gov-text-light);
    }

    .gov-nav-cta {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        background: transparent;
        border: none;
        color: var(--gov-text-light);
        text-decoration: none;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.5px;
        transition: all 0.2s ease;
    }

    .gov-nav-cta:hover {
        opacity: 0.8;
    }

    .gov-nav-cta svg {
        width: 18px;
        height: 18px;
    }
</style>

<!-- ============================================
     JAVASCRIPT - vložit na konec stránky
     ============================================ -->
<script>
    // ===== NAČTENÍ IDENTITY Z LOCALSTORAGE =====
    function loadIdentityToHeader() {
        const stored = localStorage.getItem('selectedIdentity');
        
        if (stored) {
            const identity = JSON.parse(stored);
            
            // Aktualizace hlavičky
            const userDisplayName = document.getElementById('userDisplayName');
            const userDisplayDetail = document.getElementById('userDisplayDetail');
            const dropdownName = document.getElementById('dropdownName');
            const dropdownDetail = document.getElementById('dropdownDetail');
            const dropdownBadge = document.getElementById('dropdownBadge');
            
            if (userDisplayName) userDisplayName.textContent = identity.name.toUpperCase();
            
            let detailText = identity.type;
            if (identity.detail) {
                detailText += ' · ' + identity.detail;
            }
            if (userDisplayDetail) userDisplayDetail.textContent = detailText;
            
            if (dropdownName) dropdownName.textContent = identity.name;
            if (dropdownDetail) dropdownDetail.textContent = identity.detail;
            if (dropdownBadge) dropdownBadge.textContent = identity.badge;
        }
    }

    // ===== USER MENU =====
    function toggleUserMenu() {
        const btn = document.querySelector('.gov-header-user-btn');
        const dropdown = document.getElementById('userDropdown');
        if (btn) btn.classList.toggle('active');
        if (dropdown) dropdown.classList.toggle('show');
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', function(e) {
        const userSection = document.querySelector('.gov-header-user');
        if (userSection && !userSection.contains(e.target)) {
            const btn = document.querySelector('.gov-header-user-btn');
            const dropdown = document.getElementById('userDropdown');
            if (btn) btn.classList.remove('active');
            if (dropdown) dropdown.classList.remove('show');
        }
    });

    // Načtení identity při startu
    document.addEventListener('DOMContentLoaded', loadIdentityToHeader);
</script>
